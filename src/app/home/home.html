<div class="home-container">
  <div class="hero">
    <h1 class="mat-headline-large">Welcome to the Library</h1>
    <p class="mat-body-large">Browse and manage your collection of books and authors.</p>
  </div>

  <div class="nav-cards">
    <mat-card appearance="outlined" class="nav-card">
      <mat-card-header>
        <mat-icon mat-card-avatar>menu_book</mat-icon>
        <mat-card-title>Books</mat-card-title>
        <mat-card-content>Browse and search the book catalogue</mat-card-content>
      </mat-card-header>
      <mat-card-actions>
        <a mat-flat-button routerLink="/books">Go to Books</a>
      </mat-card-actions>
    </mat-card>

    <mat-card appearance="outlined" class="nav-card">
      <mat-card-header>
        <mat-icon mat-card-avatar>people</mat-icon>
        <mat-card-title>Authors</mat-card-title>
        <mat-card-subtitle>View author profiles and their works</mat-card-subtitle>
      </mat-card-header>
      <mat-card-actions>
        <a mat-flat-button routerLink="/authors">Go to Authors</a>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
