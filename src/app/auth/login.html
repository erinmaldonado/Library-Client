<div class="auth-container">
  <mat-card class="auth-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="username" autocomplete="email">
          @if (username.errors?.['required']) {
            <mat-error>Email is required.</mat-error>
          } @else if (username.errors?.['email']) {
            <mat-error>Please enter a valid email address.</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password">
          <mat-error>Password is required.</mat-error>
        </mat-form-field>

        @if (loginError) {
          <p class="login-error">{{ loginError }}</p>
        }

        <button mat-flat-button type="submit" class="full-width submit-btn">Login</button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/register">Don't have an account? Register</a>
    </mat-card-actions>
  </mat-card>
</div>
