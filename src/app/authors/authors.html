<mat-card>
  <mat-card-header>
    <mat-card-title>Authors</mat-card-title>
  </mat-card-header>

  <div class="table-toolbar">
    <button mat-flat-button (click)="openAdd()">
      <mat-icon>add</mat-icon> Add Author
    </button>
  </div>

  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let author">
          <a [routerLink]="['/authors', author.id]">{{ author.id }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let author">{{ author.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let author" class="actions-cell">
          <button mat-icon-button (click)="openEdit(author)" aria-label="Edit author">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="openDelete(author)" aria-label="Delete author">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
